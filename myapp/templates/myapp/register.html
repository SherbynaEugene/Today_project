{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація | ToDay</title>
    <style>
        :root {
            --brand-purple: #4b1434;
            --brand-orange: #e6921a;
            --brand-green: #1f4d2b;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
        }


        .floral-wrapper {
            position: relative;
            width: 570px;
            height: 570px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .floral-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            -webkit-mask-image: radial-gradient(circle, black 40%, transparent 72%);
            mask-image: radial-gradient(circle, black 40%, transparent 72%);
        }

        .floral-bg img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform: scaleX(1.15) scaleY(1.1);
        }

        .content-area {
            position: relative;
            z-index: 10;
            width: 270px;
            height: 270px;
            background: rgb(255, 255, 255);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-shadow: 0 0 65px rgba(255, 255, 255, 1);

        }

        .close-btn {
        margin-bottom: 2px;
        background: none;
        border: none;
        color: #ccc;
        font-size: 20px;
        transition: transform 0.2s;
    }
        .close-btn:hover {
        color: var(--brand-purple);
        transform: scale(1.2);
    }

        .sparkle-icon {
            width: 40px;
            height: 40px;
            background: rgba(212, 163, 115, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e6921a;
            margin-bottom: 5px;
        }

        h2 {
            color:#1f4d2b;
            text-transform: uppercase;
            font-weight: 900;
            font-size: 28px;
            letter-spacing: -1px;
            margin: 0 0 5px 0;
        }

        form {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            width: 90%;
            padding: 11px 11px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(26, 58, 52, 0.1);
            border-radius: 30px;
            text-align: center;
            font-size: 13px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #4b1434;
            background: white;
        }

        .btn-submit {
            width: 100%;
            padding: 10px;
            background: #4b1434;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(61, 20, 45, 0.2);
            transition: transform 0.2s;
        }

        .btn-submit:hover {
            transform: scale(1.03);
        }

        .switch-link {
        margin-top: 5px;
        background: none;
        border: none;
        color: rgba(26, 58, 52, 0.6);
        text-decoration: none;
        text-transform: uppercase;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.2px;
        cursor: pointer;
        display: inline-block;
        transition: all 0.2s;
    }

        .switch-link:hover {
        color: var(--brand-green);
        transform: translateY(-2px);
    }

        .switch-link:active {
        transform: translateY(-1px) scale(0.98);
    }



    </style>
</head>
<body>

    <div class="floral-wrapper">
        <div class="floral-bg">
            <img src="{% static 'myapp/images/bg_pattern.jpg' %}" alt="Візерунок">
        </div>

        <div class="content-area">
            <a href="{% url 'myapp:index' %}" class="close-btn" style="text-decoration: none;">✕</a>

            <div class="sparkle-icon">✦♥✦</div>

            <h2>Реєстрація</h2>

        <form method="POST" id="registerForm" action="{% url 'users:register' %}">
            {% csrf_token %}

            {% if messages %}
                {% for message in messages %}
                    <div style="color: red; font-size: 11px; margin-bottom: 5px; text-align: center;">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <input type="text" name="username" placeholder="Ім'я користувача" value="{{ username }}" required>
            <input type="email" name="email" placeholder="Електронна пошта" value="{{ email }}" required>

            <div style="position: relative; width: 100%;">
                <input type="password" name="password1" id="pass1" placeholder="Пароль" required>
                <span onclick="togglePass('pass1')" style="position: absolute; right: 15px; top: 10px; cursor: pointer; font-size: 12px; color: #aaa;">👁️</span>
            </div>

            <div style="position: relative; width: 100%;">
                <input type="password" name="password2" id="pass2" placeholder="Повторіть пароль" required>
                <span onclick="togglePass('pass2')" style="position: absolute; right: 15px; top: 10px; cursor: pointer; font-size: 12px; color: #aaa;">👁️</span>
            </div>

            <button type="submit" class="btn-submit">Зареєструватися</button>
        </form>



            <a href="{%  url 'myapp:sign_in' %}" class="switch-link">Вже є акаунт?</a>
        </div>
    </div>
<script>

function togglePass(id) {
    const input = document.getElementById(id);
    if (input.type === "password") {
        input.type = "text";
    } else {
        input.type = "password";
    }
}


</script>
</body>
</html>
